name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: aktsql
  APP_NAME: AktSQL

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libsqlite3-dev \
            libssl-dev \
            pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check -p aktsql --all-targets

      - name: Test
        run: cargo test -p aktsql

  windows:
    name: Windows ${{ matrix.arch }} exe and msi
    needs: verify
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            rust-target: x86_64-pc-windows-msvc
            vcpkg-triplet: x64-windows-static
            wix-arch: x64
          - arch: arm64
            rust-target: aarch64-pc-windows-msvc
            vcpkg-triplet: arm64-windows-static
            wix-arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prepare OpenSSL
        shell: pwsh
        run: |
          vcpkg install openssl:${{ matrix.vcpkg-triplet }}
          "OPENSSL_DIR=$env:VCPKG_INSTALLATION_ROOT\installed\${{ matrix.vcpkg-triplet }}" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENSSL_STATIC=1" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build release binary
        run: cargo build --release -p aktsql --target ${{ matrix.rust-target }}

      - name: Install WiX Toolset
        run: choco install wixtoolset --no-progress -y

      - name: Package Windows artifacts
        shell: pwsh
        run: .github/scripts/package-windows.ps1 -Arch ${{ matrix.arch }} -TargetTriple ${{ matrix.rust-target }} -WixArch ${{ matrix.wix-arch }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: dist/windows-${{ matrix.arch }}/*
          if-no-files-found: error

  macos:
    name: macOS arm64 app and dmg
    needs: verify
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prepare OpenSSL
        run: |
          brew install openssl@3 pkg-config
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release -p aktsql

      - name: Package macOS artifacts
        run: bash .github/scripts/package-macos.sh arm64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/macos-arm64-artifacts/*
          if-no-files-found: error

  linux:
    name: Linux ${{ matrix.arch }} AppImage
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            fuse \
            libfuse2 \
            libx11-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libsqlite3-dev \
            libssl-dev \
            pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p aktsql

      - name: Package AppImage
        run: bash .github/scripts/package-linux-appimage.sh ${{ matrix.arch }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist/linux-${{ matrix.arch }}-artifacts/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          fail_on_unmatched_files: true
          overwrite_files: true
