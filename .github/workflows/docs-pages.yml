name: Docs Pages

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build VuePress site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: docs-site
        run: npm install

      - name: Build
        working-directory: docs-site
        run: npm run docs:build

      - name: Publish GitHub Pages root site
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: AktSQL/aktsql.github.io
          publish_branch: main
          publish_dir: docs-site/docs/.vuepress/dist
          force_orphan: true

      - name: Deploy Cloudflare Pages
        working-directory: docs-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          : "${CLOUDFLARE_API_TOKEN:?Missing GitHub secret CLOUDFLARE_API_TOKEN}"
          : "${CLOUDFLARE_ACCOUNT_ID:?Missing GitHub secret CLOUDFLARE_ACCOUNT_ID}"

          npx wrangler pages deploy docs/.vuepress/dist \
            --project-name aktsql \
            --branch main \
            --commit-hash "$GITHUB_SHA" \
            --commit-message "Deploy AktSQL official site from $GITHUB_SHA"
