name: Docs Pages

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build VuePress site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: docs-site
        run: npm install

      - name: Build
        working-directory: docs-site
        run: npm run docs:build

      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs-site/docs/.vuepress/dist
          force_orphan: true

      - name: Ensure Cloudflare Pages project
        working-directory: docs-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Cloudflare secrets are missing; skipping Pages project creation."
            exit 0
          fi

          if npx wrangler pages project list --json | node -e '
            const input = require("fs").readFileSync(0, "utf8");
            const projects = JSON.parse(input);
            const found = projects.some((project) => project.name === "aktsql-official-site");
            process.exit(found ? 0 : 1);
          '; then
            echo "Cloudflare Pages project aktsql-official-site already exists."
          else
            npx wrangler pages project create aktsql-official-site \
              --production-branch main
          fi

      - name: Deploy Cloudflare Pages
        working-directory: docs-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Cloudflare secrets are missing; skipping Pages deployment."
            exit 0
          fi

          npx wrangler pages deploy docs/.vuepress/dist \
            --project-name aktsql-official-site \
            --branch main \
            --commit-hash "$GITHUB_SHA" \
            --commit-message "Deploy AktSQL official site from $GITHUB_SHA"
