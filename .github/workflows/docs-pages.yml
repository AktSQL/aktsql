name: Docs Pages

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:
    inputs:
      deploy_to_cloudflare:
        description: "Deploy uploaded Cloudflare version to 100% traffic"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build VuePress site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: docs-site
        run: npm install

      - name: Build
        working-directory: docs-site
        run: npm run docs:build

      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs-site/docs/.vuepress/dist
          force_orphan: true

      - name: Upload Cloudflare Worker version
        working-directory: docs-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VERSION_TAG: docs-${{ github.sha }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Cloudflare secrets are missing; skipping wrangler versions upload."
            exit 0
          fi

          npx wrangler versions upload \
            --config wrangler.jsonc \
            --tag "$VERSION_TAG" \
            --message "Upload AktSQL official site from $GITHUB_SHA"

      - name: Deploy Cloudflare Worker version
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_to_cloudflare }}
        working-directory: docs-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VERSION_TAG: docs-${{ github.sha }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "Cloudflare secrets are missing; cannot deploy uploaded version."
            exit 1
          fi

          npx wrangler versions deploy \
            --config wrangler.jsonc \
            --version-tag "$VERSION_TAG@100%" \
            --message "Deploy AktSQL official site from $GITHUB_SHA" \
            --yes
